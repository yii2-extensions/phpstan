---
on:
  pull_request: &ignore-paths
    paths-ignore:
      - ".gitattributes"
      - ".gitignore"
      - "CHANGELOG.md"
      - "docs/**"
      - "README.md"

  push: *ignore-paths

name: Composer require checker

permissions:
  contents: read

jobs:
  composer-require-checker:
    uses: yii2-framework/actions/.github/workflows/composer-require-checker.yml@ea13c0f091d2e888be095dd0265544ff8276dc9f # v2.0.1
